<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#ea580c">
    
    <title>Chuck Guard AI</title>

    <!-- Direktes Inline-Manifest für maximale Kompatibilität ohne Blobs -->
    <link rel="manifest" href='data:application/manifest+json,{"name":"Chuck Guard AI","short_name":"ChuckGuard","start_url":"index.html","display":"standalone","background_color":"#020617","theme_color":"#ea580c","icons":[{"src":"data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCA1MTIgNTEyIj48cmVjdCB3aWR0aD0iNTEyIiBoZWlnaHQ9IjUxMiIgZmlsbD0iIzAyMDYxNyIvPjxwYXRoIGQ9Ik0yNTYgNTBMOTYgMTUwdjE0MGMwIDExMC40IDg5LjYgMjAwIDIwMCAyMDBzMjAwLTg5LjYgMjAwLTIwMFYxNTBMMjU2IDUweiIgZmlsbD0iI2VhNTgwYyIvPjwvc3ZnPg==","sizes":"512x512","type":"image/svg+xml","purpose":"any maskable"}]}'>

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .recording-ring { animation: ring 1.5s ease-out infinite; }
        @keyframes ring { 0% { transform: scale(1); opacity: 0.8; } 100% { transform: scale(1.5); opacity: 0; } }
        body { 
            -webkit-user-select: none; 
            user-select: none; 
            background-color: #020617;
            overscroll-behavior-y: contain;
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>
<body class="text-white font-sans min-h-screen flex flex-col items-center p-4">

    <header class="w-full max-w-md py-6 flex justify-between items-center text-center">
        <div class="flex flex-col mx-auto">
            <h1 class="text-3xl font-black text-orange-500 tracking-tighter uppercase italic leading-none">Chuck Guard</h1>
            <span class="text-[10px] font-bold text-slate-500 uppercase tracking-[0.3em] mt-1 text-center">Tactical AI Interface</span>
        </div>
    </header>

    <main class="w-full max-w-md bg-slate-900/50 backdrop-blur-md rounded-[2.5rem] p-8 shadow-2xl border border-white/5 flex flex-col gap-8">
        
        <div class="flex items-center justify-between border-b border-white/5 pb-4">
            <div class="flex items-center gap-2">
                <div id="status-dot" class="w-2 h-2 rounded-full bg-green-500 animate-pulse shadow-[0_0_8px_#22c55e]"></div>
                <span class="text-[10px] font-black uppercase text-slate-400 tracking-widest">Patrouille Aktiv</span>
            </div>
            <div class="text-[10px] font-mono text-slate-600 uppercase">System Ready</div>
        </div>

        <div class="h-48 bg-black/40 rounded-3xl flex items-center justify-center relative border border-orange-500/10">
            <div id="idle-icon" class="text-orange-500/30">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-24 h-24" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="0.5" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
                </svg>
            </div>
            
            <div id="recording-ui" class="hidden flex flex-col items-center">
                <div class="relative">
                    <div class="absolute inset-0 bg-orange-600 rounded-full recording-ring"></div>
                    <div class="relative w-20 h-20 bg-orange-600 rounded-full flex items-center justify-center">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" />
                        </svg>
                    </div>
                </div>
            </div>
        </div>

        <button id="start-btn" class="w-full bg-gradient-to-b from-orange-500 to-orange-700 text-white font-black py-7 rounded-3xl shadow-xl active:scale-[0.95] transition-all border-b-4 border-orange-900 uppercase italic">
            Anruf abfangen
        </button>

        <div id="result-area" class="hidden flex flex-col gap-4">
            <div class="bg-black/60 rounded-2xl p-4 border border-white/5">
                <p id="transcript-text" class="text-sm text-slate-300 italic min-h-[1.5rem]">Höre zu...</p>
            </div>
            <div id="verdict-box" class="bg-slate-800/40 rounded-2xl p-5 border border-white/5 flex items-center gap-4">
                <div id="verdict-icon" class="text-3xl">🤠</div>
                <div class="flex-1">
                    <h3 id="verdict-title" class="font-black italic text-sm uppercase">Analyse</h3>
                    <p id="verdict-desc" class="text-[10px] text-slate-500 uppercase">Warte auf Daten...</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Service Worker Fix: Blobs werden oft blockiert. 
        // Wir nutzen eine No-Op Strategie, die direkt im HTML definiert ist.
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                // Wir registrieren einen leeren Service Worker, um die PWA-Anforderungen zu erfüllen.
                // Auf GitHub Pages sollte dies idealerweise eine physische Datei sein (sw.js).
                // Falls das weiterhin fehlschlägt, ist das Manifest via Data-URL die stabilste Lösung.
                navigator.serviceWorker.register('data:text/javascript;base64,c2VsZi5hZGRFdmVudExpc3RlbmVyKCdmZXRjaCcsIGUgPT4gZS5yZXNwb25kV2l0aChmZXRjaChlLnJlcXVlc3QpKSk7')
                .catch(err => console.log("SW Register bypass active"));
            });
        }

        const apiKey = ""; 
        const startBtn = document.getElementById('start-btn');
        const recordingUI = document.getElementById('recording-ui');
        const idleIcon = document.getElementById('idle-icon');
        const resultArea = document.getElementById('result-area');
        const transcriptText = document.getElementById('transcript-text');
        const verdictBox = document.getElementById('verdict-box');
        const verdictTitle = document.getElementById('verdict-title');
        const verdictDesc = document.getElementById('verdict-desc');
        const verdictIcon = document.getElementById('verdict-icon');

        let recognition;
        let analysisInProgress = false;

        async function speak(text) {
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Chuck Norris sagt extrem autoritär: ${text}` }] }],
                        generationConfig: {
                            responseModalities: ["AUDIO"],
                            speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Puck" } } } 
                        }
                    })
                });
                const result = await response.json();
                const audioData = result.candidates[0].content.parts[0].inlineData.data;
                const audio = new Audio("data:audio/wav;base64," + audioData);
                return new Promise(r => { audio.onended = r; audio.play(); });
            } catch (e) {
                const m = new SpeechSynthesisUtterance(text); m.lang = 'de-DE'; window.speechSynthesis.speak(m);
            }
        }

        async function analyzeCall(text) {
            const systemPrompt = `Du bist Chuck Norris. Analysiere den Text extrem streng auf Betrug (SCAM), PAKETBOTE oder LEGITIM. JSON Format: {"verdict": "...", "reason": "...", "chuck_comment": "..."}`;
            try {
                const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text }] }],
                        systemInstruction: { parts: [{ text: systemPrompt }] },
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });
                const d = await r.json();
                return JSON.parse(d.candidates[0].content.parts[0].text);
            } catch (e) { return { verdict: 'UNBEKANNT', reason: 'Fehler', chuck_comment: 'Warten...' }; }
        }

        if ('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'de-DE';
            recognition.onresult = (e) => {
                let trans = '';
                for (let i = e.resultIndex; i < e.results.length; ++i) {
                    if (e.results[i].isFinal) trans += e.results[i][0].transcript;
                }
                if(trans.length > 15 && !analysisInProgress) {
                    transcriptText.innerText = `"${trans}"`;
                    analysisInProgress = true;
                    analyzeCall(trans).then(res => {
                        verdictBox.className = "bg-red-900/40 rounded-2xl p-5 border-2 border-red-600 flex items-center gap-4";
                        verdictTitle.innerText = res.verdict;
                        verdictDesc.innerText = res.chuck_comment;
                        speak(res.chuck_comment);
                    });
                }
            };
        }

        startBtn.addEventListener('click', async () => {
            resultArea.classList.remove('hidden');
            idleIcon.classList.add('hidden');
            recordingUI.classList.remove('hidden');
            await speak("Chuck Norris hier. Was willst du?");
            if(recognition) recognition.start();
            setTimeout(() => {
                if(recognition) recognition.stop();
                idleIcon.classList.remove('hidden');
                recordingUI.classList.add('hidden');
            }, 30000);
        });
    </script>
</body>
</html>
