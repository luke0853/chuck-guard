<body class="text-white font-sans min-h-screen flex flex-col items-center p-4">

    <header class="w-full max-w-md py-6 flex justify-between items-center">
        <div class="flex flex-col">
            <h1 class="text-4xl font-black text-orange-500 tracking-tighter uppercase italic leading-none">Chuck Guard</h1>
            <span class="text-[10px] font-bold text-slate-500 uppercase tracking-[0.4em] mt-1">Tactical Voice Defense</span>
        </div>
        <div class="text-[10px] font-mono text-orange-500/50">STRICT_MODE_ON</div>
    </header>

    <main class="w-full max-w-md glass-ui rounded-[3rem] p-8 shadow-2xl flex flex-col gap-8">
        
        <!-- Status Anzeige -->
        <div class="flex items-center justify-between opacity-60">
            <div class="flex items-center gap-2">
                <div id="status-dot" class="w-2 h-2 rounded-full bg-green-500 shadow-[0_0_10px_#22c55e]"></div>
                <span class="text-[10px] font-black uppercase tracking-widest">System Bereit</span>
            </div>
            <div class="text-[10px] font-mono">BV9300_AI_CORE</div>
        </div>

        <!-- Zentrales Visuelles Element -->
        <div class="h-56 bg-black/40 rounded-[2rem] flex items-center justify-center border border-white/5 relative">
            <div id="idle-icon" class="text-orange-500/20">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-32 h-32" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="0.3" d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
                </svg>
            </div>
            
            <div id="recording-ui" class="hidden">
                <div class="relative">
                    <div class="absolute inset-0 bg-orange-600 rounded-full recording-ring"></div>
                    <div class="relative w-24 h-24 bg-orange-600 rounded-full flex items-center justify-center shadow-2xl">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" />
                        </svg>
                    </div>
                </div>
            </div>
        </div>

        <!-- Aktions Button -->
        <button id="start-btn" class="w-full bg-orange-600 hover:bg-orange-500 text-white font-black py-7 rounded-3xl shadow-xl active:scale-95 transition-all uppercase italic text-xl border-b-4 border-orange-800">
            Anruf abfangen
        </button>

        <!-- Ergebnis Bereich -->
        <div id="result-area" class="hidden flex flex-col gap-4 animate-in fade-in slide-in-from-bottom-4">
            <div class="bg-black/60 rounded-2xl p-4 border border-white/5">
                <p id="transcript-text" class="text-sm text-slate-400 italic">Höre zu...</p>
            </div>
            <div id="verdict-box" class="bg-slate-800/40 rounded-3xl p-6 border border-white/10 flex items-center gap-5">
                <div id="verdict-icon" class="text-4xl">📡</div>
                <div>
                    <h3 id="verdict-title" class="font-black italic text-sm uppercase text-orange-500">Überprüfung</h3>
                    <p id="verdict-desc" class="text-[11px] text-slate-300 uppercase leading-snug mt-1">Sichere Verbindung...</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        const apiKey = ""; // API KEY HIER - WICHTIG: Ersetze das durch deinen echten Schlüssel, sonst kommt der 403 Forbidden Fehler!
        const startBtn = document.getElementById('start-btn');
        const recordingUI = document.getElementById('recording-ui');
        const idleIcon = document.getElementById('idle-icon');
        const resultArea = document.getElementById('result-area');
        const transcriptText = document.getElementById('transcript-text');
        const verdictBox = document.getElementById('verdict-box');
        const verdictTitle = document.getElementById('verdict-title');
        const verdictDesc = document.getElementById('verdict-desc');
        const verdictIcon = document.getElementById('verdict-icon');
        const statusDot = document.getElementById('status-dot');

        let recognition;
        let isScreening = false;

        // Robuster Netzwerk-Wrapper, der Verbindungsfehler automatisch mehrmals probiert (Exponential Backoff)
        async function fetchWithRetry(url, options) {
            const delays = [1000, 2000, 4000, 8000, 16000];
            for (let i = 0; i < delays.length; i++) {
                try {
                    const response = await fetch(url, options);
                    if (response.status === 403) throw new Error("403"); // Fehlender API-Key -> direkt aussteigen
                    if (!response.ok) throw new Error("API Fehler");
                    return await response.json();
                } catch (e) {
                    if (e.message === "403") throw e;
                    if (i === delays.length - 1) throw e;
                    await new Promise(r => setTimeout(r, delays[i]));
                }
            }
        }

        // CHUCK NORRIS VOICE ENGINE (Gemini Puck)
        async function speak(text) {
            statusDot.className = "w-2 h-2 rounded-full bg-blue-500 animate-pulse shadow-[0_0_10px_#3b82f6]";
            try {
                const result = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Sage mit extrem tiefer, männlicher und autoritärer Stimme: ${text}` }] }],
                        generationConfig: {
                            responseModalities: ["AUDIO"],
                            speechConfig: { 
                                voiceConfig: { 
                                    prebuiltVoiceConfig: { voiceName: "Puck" } // Puck ist die maskuline, tiefe Stimme
                                } 
                            }
                        }
                    })
                });
                if (!result.candidates?.[0]?.content?.parts?.[0]?.inlineData?.data) throw "Voice fail";
                
                const audioData = result.candidates[0].content.parts[0].inlineData.data;
                const audio = new Audio("data:audio/wav;base64," + audioData);
                audio.playbackRate = 0.95; // Etwas langsamer für mehr "Gewicht"
                return new Promise(r => { audio.onended = r; audio.play(); });
            } catch (e) {
                if (e.message === "403") {
                    verdictTitle.innerText = "ZUGRIFF VERWEIGERT";
                    verdictDesc.innerText = "API-Key fehlt! Bitte im Code eintragen.";
                    verdictIcon.innerText = "⚠️";
                }
                
                // FALLBACK zu Systemstimme
                return new Promise(r => {
                    const m = new SpeechSynthesisUtterance(text);
                    m.lang = 'de-DE';
                    m.pitch = 0.5; // Versuche die Systemstimme tiefer zu machen
                    m.rate = 0.8;
                    m.onend = r;
                    window.speechSynthesis.speak(m);
                });
            }
        }

        async function analyzeCall(text) {
            const systemPrompt = `Du bist Chuck Norris. Analysiere: SCAM, PAKETBOTE, oder OK. JSON: {"verdict": "...", "reason": "...", "chuck_comment": "..."}`;
            try {
                const d = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: text }] }],
                        systemInstruction: { parts: [{ text: systemPrompt }] },
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });
                return JSON.parse(d.candidates[0].content.parts[0].text);
            } catch (e) { 
                if (e.message === "403") return { verdict: 'FEHLER', reason: 'Missing Key', chuck_comment: 'Verbindung steht nicht. API-KEY FEHLT!' };
                return { verdict: 'UNBEKANNT', reason: 'Error', chuck_comment: 'Verbindung fehlgeschlagen.' }; 
            }
        }

        if ('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'de-DE';
            
            recognition.onresult = (e) => {
                let trans = '';
                for (let i = e.resultIndex; i < e.results.length; ++i) {
                    if (e.results[i].isFinal) trans += e.results[i][0].transcript;
                }
                if(trans.length > 12 && isScreening) {
                    transcriptText.innerText = `"${trans}"`;
                    handleVerdict(trans);
                }
            };
        }

        async function handleVerdict(text) {
            const res = await analyzeCall(text);
            if (res.verdict === 'SCAM') {
                isScreening = false;
                verdictBox.className = "bg-red-950/40 rounded-3xl p-6 border border-red-500/50 flex items-center gap-5";
                verdictTitle.innerText = "TERMINIERT";
                verdictIcon.innerText = "👊";
                verdictDesc.innerText = res.chuck_comment;
                await speak("Verschwinde. " + res.chuck_comment);
                stopAll();
            } else if (res.verdict === 'PAKETBOTE') {
                isScreening = false;
                verdictBox.className = "bg-orange-950/40 rounded-3xl p-6 border border-orange-500/50 flex items-center gap-5";
                verdictTitle.innerText = "PAKET ERWARTET";
                verdictIcon.innerText = "📦";
                verdictDesc.innerText = "Bote erkannt. Stelle durch.";
                await speak("Ein Paketbote. Chuck Norris lässt dich durch.");
                stopAll();
            }
        }

        function stopAll() {
            startBtn.disabled = false;
            startBtn.innerText = "Anruf abfangen";
            idleIcon.classList.remove('hidden'); 
            recordingUI.classList.add('hidden');
            if(recognition) recognition.stop();
            statusDot.className = "w-2 h-2 rounded-full bg-green-500 shadow-[0_0_10px_#22c55e]";
        }

        startBtn.addEventListener('click', async () => {
            isScreening = true;
            resultArea.classList.remove('hidden');
            startBtn.disabled = true;
            startBtn.innerText = "ASSISTENT AKTIV";
            idleIcon.classList.add('hidden'); 
            recordingUI.classList.remove('hidden');
            
            await speak("Hier ist Chuck Norris. Wer wagt es, hier anzurufen?");
            if(recognition) recognition.start();
            
            setTimeout(() => { if(isScreening) stopAll(); }, 35000);
        });
    </script>
