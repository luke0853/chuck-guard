<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <!-- PWA Primäre Meta Tags -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#ea580c">
    
    <title>Chuck Guard AI</title>
    
    <!-- SVG Favicon / Logo (Wichtig für Installation) -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23ea580c'%3E%3Cpath d='M12 2L3 7v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V7l-9-5zm0 15.5c-3.03 0-5.5-2.47-5.5-5.5s2.47-5.5 5.5-5.5 5.5 2.47 5.5 5.5-2.47 5.5-5.5 5.5z'/%3E%3C/svg%3E">
    
    <link rel="manifest" href="manifest.json">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes pulse-ring {
            0% { transform: scale(0.33); }
            80%, 100% { opacity: 0; }
        }
        .animate-pulse-ring {
            animation: pulse-ring 1.25s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }
        
        body { 
            background-color: #020617;
            touch-action: manipulation;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .glass-panel {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="text-white font-sans overflow-hidden">

    <div class="flex-1 flex flex-col max-w-md mx-auto w-full p-6">
        
        <header class="py-8 flex flex-col items-center">
            <h1 class="text-5xl font-black text-orange-500 tracking-tighter uppercase italic leading-none text-center">Chuck Guard</h1>
            <div class="flex items-center gap-2 mt-2">
                <span id="system-status-dot" class="w-2 h-2 rounded-full bg-green-500"></span>
                <span class="text-[10px] font-bold text-slate-500 uppercase tracking-[0.3em] font-mono italic">Tactical AI Interface</span>
            </div>
        </header>

        <main class="flex-1 flex flex-col gap-6">
            <div class="glass-panel rounded-[2.5rem] p-8 flex flex-col gap-8 flex-1">
                
                <!-- Visuelles Feedback -->
                <div class="flex-1 flex items-center justify-center relative">
                    <div id="idle-icon" class="text-orange-500/10 transition-opacity duration-500">
                        <svg xmlns="http://www.w3.org/2000/svg" width="160" height="160" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="0.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                    </div>

                    <div id="active-scanner" class="hidden relative scale-110">
                        <div class="absolute inset-0 bg-orange-500 rounded-full animate-pulse-ring"></div>
                        <div class="relative bg-orange-600 w-32 h-32 rounded-full flex items-center justify-center shadow-2xl">
                            <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
                        </div>
                    </div>
                </div>

                <!-- Live Interface -->
                <div id="log-container" class="hidden flex flex-col gap-3">
                    <div class="bg-black/60 rounded-2xl p-4 font-mono text-[10px] border border-orange-500/20 text-orange-400">
                        <div class="flex justify-between mb-1 opacity-50">
                            <span>COMMS_LOG:</span>
                            <span id="timer">LIVE</span>
                        </div>
                        <p id="live-text" class="text-slate-200 italic h-12 overflow-hidden leading-relaxed">System bereit...</p>
                    </div>

                    <div id="verdict-result" class="bg-orange-500/5 rounded-2xl p-4 border border-orange-500/20 flex items-center gap-4">
                        <div id="v-icon" class="text-3xl grayscale opacity-50">📡</div>
                        <div>
                            <div id="v-label" class="font-black italic text-[10px] uppercase text-orange-500/50">Warte auf Signal</div>
                            <div id="v-text" class="text-[10px] text-slate-500 uppercase leading-tight mt-1">Überwachung aktiv...</div>
                        </div>
                    </div>
                </div>

                <button id="main-action-btn" class="w-full bg-orange-600 hover:bg-orange-500 text-white font-black py-6 rounded-3xl shadow-xl transition-all active:scale-95 uppercase italic text-xl border-b-4 border-orange-800">
                    Abfangen
                </button>
            </div>
        </main>

        <footer class="py-6 text-center opacity-30">
            <p class="text-[9px] font-mono text-slate-400 uppercase tracking-widest">Chuck Guard v1.0 // BV9300 Tactical Edition</p>
        </footer>
    </div>

    <!-- Installations Banner -->
    <div id="pwa-install-overlay" class="hidden fixed bottom-8 left-6 right-6 z-50 glass-panel p-5 rounded-[2rem] border-orange-500/40 flex justify-between items-center shadow-2xl animate-bounce">
        <div class="flex flex-col">
            <span class="text-[10px] font-black uppercase text-orange-500">System-Upgrade</span>
            <span class="text-[9px] text-slate-400 uppercase">Als App installieren</span>
        </div>
        <button id="pwa-btn" class="bg-orange-600 text-white px-5 py-2.5 rounded-2xl text-[10px] font-bold uppercase shadow-lg">Hinzufügen</button>
    </div>

    <script>
        const apiKey = ""; // DEIN API KEY HIER

        // --- Robuste SW Registrierung ---
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                // Nur registrieren, wenn wir NICHT auf einer blob-URL sind (verhindert den Fehler im Preview)
                if (!window.location.protocol.startsWith('blob')) {
                    navigator.serviceWorker.register('sw.js').catch(() => {});
                }
            });
        }

        // --- PWA Installation ---
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('pwa-install-overlay').classList.remove('hidden');
        });

        document.getElementById('pwa-btn').addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') document.getElementById('pwa-install-overlay').classList.add('hidden');
                deferredPrompt = null;
            }
        });

        // --- AI & Logik ---
        const btn = document.getElementById('main-action-btn');
        const idleIcon = document.getElementById('idle-icon');
        const activeScanner = document.getElementById('active-scanner');
        const logContainer = document.getElementById('log-container');
        const liveText = document.getElementById('live-text');
        const vLabel = document.getElementById('v-label');
        const vText = document.getElementById('v-text');
        const vIcon = document.getElementById('v-icon');
        const dot = document.getElementById('system-status-dot');

        let recognition;
        let isProcessing = false;

        async function speak(text) {
            dot.className = "w-2 h-2 rounded-full bg-blue-500 animate-pulse";
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Chuck Norris sagt extrem trocken: ${text}` }] }],
                        generationConfig: {
                            responseModalities: ["AUDIO"],
                            speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Puck" } } } 
                        }
                    })
                });
                const data = await response.json();
                const b64 = data.candidates?.[0]?.content?.parts?.[0]?.inlineData?.data;
                if (b64) {
                    const audio = new Audio("data:audio/wav;base64," + b64);
                    return new Promise(r => { audio.onended = r; audio.play(); });
                }
                throw 'No Audio';
            } catch (e) {
                const m = new SpeechSynthesisUtterance(text); m.lang = 'de-DE'; window.speechSynthesis.speak(m);
            }
        }

        async function analyze(transcript) {
            const prompt = `Analysiere als Chuck Norris: SCAM, BOT, oder OK. JSON: {"status": "...", "chuck": "..."}`;
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: transcript }] }],
                        systemInstruction: { parts: [{ text: prompt }] },
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });
                const d = await res.json();
                return JSON.parse(d.candidates[0].content.parts[0].text);
            } catch (e) {
                return { status: "OFFLINE", chuck: "Ich brauche kein Internet zum Kämpfen." };
            }
        }

        if ('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'de-DE';

            recognition.onresult = (e) => {
                let current = '';
                for (let i = e.resultIndex; i < e.results.length; ++i) {
                    current += e.results[i][0].transcript;
                }
                liveText.innerText = current;

                if (current.length > 40 && !isProcessing) {
                    isProcessing = true;
                    analyze(current).then(res => {
                        vLabel.innerText = res.status;
                        vLabel.className = "font-black italic text-[10px] uppercase text-orange-500";
                        vText.innerText = res.chuck;
                        vIcon.innerText = res.status === 'SCAM' ? "💀" : "🛡️";
                        vIcon.className = "text-3xl grayscale-0 opacity-100";
                        speak(res.chuck);
                    });
                }
            };
        }

        btn.addEventListener('click', async () => {
            isProcessing = false;
            btn.disabled = true;
            btn.innerText = "HÖRE ZU...";
            idleIcon.classList.add('opacity-0');
            setTimeout(() => idleIcon.classList.add('hidden'), 500);
            activeScanner.classList.remove('hidden');
            logContainer.classList.remove('hidden');
            dot.className = "w-2 h-2 rounded-full bg-orange-500 animate-ping";

            await speak("Chuck Norris hier. Sprich, bevor ich auflege.");
            try { recognition.start(); } catch(e) {}
            
            setTimeout(() => {
                try { recognition.stop(); } catch(e) {}
                btn.disabled = false;
                btn.innerText = "ABFANGEN";
                activeScanner.classList.add('hidden');
                idleIcon.classList.remove('hidden');
                idleIcon.classList.remove('opacity-0');
                dot.className = "w-2 h-2 rounded-full bg-green-500";
            }, 25000);
        });
    </script>
</body>
</html>
