<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#ea580c">
    
    <title>Chuck Guard AI</title>
    <link rel="manifest" href="./manifest.json">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .recording-ring { animation: ring 1.5s ease-out infinite; }
        @keyframes ring { 0% { transform: scale(1); opacity: 0.8; } 100% { transform: scale(1.5); opacity: 0; } }
        body { 
            -webkit-user-select: none; 
            user-select: none; 
            background-color: #020617;
            overscroll-behavior-y: contain;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
    </style>
</head>
<body class="text-white font-sans min-h-screen flex flex-col items-center p-4">

    <!-- INSTALLER OVERLAY (Erzwingt die Installation) -->
    <div id="install-banner" class="hidden w-full max-w-md bg-orange-600 p-4 rounded-2xl mb-6 flex justify-between items-center shadow-2xl border border-orange-400 animate-bounce">
        <div class="flex items-center gap-3">
            <span class="text-2xl">📲</span>
            <div class="text-xs font-bold uppercase tracking-tight">System-Installation verfügbar</div>
        </div>
        <button id="install-button" class="bg-white text-orange-600 px-4 py-2 rounded-xl font-black text-xs uppercase shadow-inner">Installieren</button>
    </div>

    <header class="w-full max-w-md py-6 flex justify-between items-center text-center">
        <div class="flex flex-col mx-auto">
            <h1 class="text-3xl font-black text-orange-500 tracking-tighter uppercase italic leading-none">Chuck Guard</h1>
            <span class="text-[10px] font-bold text-slate-500 uppercase tracking-[0.3em] mt-1 text-center font-mono">Tactical AI Interface</span>
        </div>
    </header>

    <main class="w-full max-w-md bg-slate-900/50 backdrop-blur-md rounded-[2.5rem] p-8 shadow-2xl border border-white/5 flex flex-col gap-8 relative overflow-hidden">
        
        <div class="flex items-center justify-between border-b border-white/5 pb-4">
            <div class="flex items-center gap-2">
                <div id="status-dot" class="w-2 h-2 rounded-full bg-green-500 animate-pulse shadow-[0_0_8px_#22c55e]"></div>
                <span class="text-[10px] font-black uppercase text-slate-400 tracking-widest">Patrouille Aktiv</span>
            </div>
            <div class="text-[10px] font-mono text-slate-600 uppercase italic">BV9300_PWA_FORCED</div>
        </div>

        <div class="h-48 bg-black/40 rounded-3xl flex items-center justify-center relative border border-orange-500/10">
            <div id="idle-icon" class="text-orange-500/20">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-32 h-32" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="0.5" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
                </svg>
            </div>
            <div id="recording-ui" class="hidden flex flex-col items-center">
                <div class="relative">
                    <div class="absolute inset-0 bg-orange-600 rounded-full recording-ring"></div>
                    <div class="relative w-24 h-24 bg-orange-600 rounded-full flex items-center justify-center shadow-lg">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" />
                        </svg>
                    </div>
                </div>
            </div>
        </div>

        <button id="start-btn" class="w-full bg-gradient-to-b from-orange-500 to-orange-700 text-white font-black py-7 rounded-3xl shadow-xl active:scale-[0.95] transition-all border-b-4 border-orange-900 uppercase italic">
            Anruf abfangen
        </button>

        <div id="result-area" class="hidden flex flex-col gap-4">
            <div class="bg-black/60 rounded-2xl p-4 border border-white/5">
                <p id="transcript-text" class="text-sm text-slate-300 italic min-h-[1.5rem]">Höre zu...</p>
            </div>
            <div id="verdict-box" class="bg-slate-800/40 rounded-2xl p-5 border border-white/5 flex items-center gap-4">
                <div id="verdict-icon" class="text-3xl">🤠</div>
                <div class="flex-1">
                    <h3 id="verdict-title" class="font-black italic text-sm uppercase">Analyse</h3>
                    <p id="verdict-desc" class="text-[10px] text-slate-500 uppercase">Sammle Daten...</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        // PWA INSTALL LOGIK (Der Button-Trick)
        let deferredPrompt;
        const installBanner = document.getElementById('install-banner');
        const installButton = document.getElementById('install-button');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault(); // Verhindert den Standard-Dialog
            deferredPrompt = e;
            installBanner.classList.remove('hidden'); // Zeigt unseren eigenen Button
        });

        installButton.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    installBanner.classList.add('hidden');
                }
                deferredPrompt = null;
            }
        });

        // SW Registrierung
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(err => console.log(err));
            });
        }

        // --- HIER FOLGT DIE CHUCK NORRIS LOGIK (API etc.) ---
        const apiKey = ""; // DEIN API KEY
        const startBtn = document.getElementById('start-btn');
        const recordingUI = document.getElementById('recording-ui');
        const idleIcon = document.getElementById('idle-icon');
        const resultArea = document.getElementById('result-area');
        const transcriptText = document.getElementById('transcript-text');
        const verdictBox = document.getElementById('verdict-box');
        const verdictTitle = document.getElementById('verdict-title');
        const verdictDesc = document.getElementById('verdict-desc');

        let recognition;
        async function speak(text) {
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Chuck Norris sagt: ${text}` }] }],
                        generationConfig: {
                            responseModalities: ["AUDIO"],
                            speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Puck" } } } 
                        }
                    })
                });
                const result = await response.json();
                const audioData = result.candidates[0].content.parts[0].inlineData.data;
                const audio = new Audio("data:audio/wav;base64," + audioData);
                return new Promise(r => { audio.onended = r; audio.play(); });
            } catch (e) {
                const m = new SpeechSynthesisUtterance(text); m.lang = 'de-DE'; window.speechSynthesis.speak(m);
            }
        }

        if ('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'de-DE';
            recognition.onresult = (e) => {
                let trans = '';
                for (let i = e.resultIndex; i < e.results.length; ++i) {
                    if (e.results[i].isFinal) trans += e.results[i][0].transcript;
                }
                if(trans.length > 5) transcriptText.innerText = trans;
            };
        }

        startBtn.addEventListener('click', async () => {
            resultArea.classList.remove('hidden');
            idleIcon.classList.add('hidden');
            recordingUI.classList.remove('hidden');
            await speak("Chuck Norris ist bereit.");
            if(recognition) recognition.start();
        });
    </script>
</body>
</html>
