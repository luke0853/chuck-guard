<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#ea580c">
    
    <title>Chuck Guard AI</title>
    <link rel="manifest" href="./manifest.json">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .recording-ring { animation: ring 1.5s ease-out infinite; }
        @keyframes ring { 0% { transform: scale(1); opacity: 0.8; } 100% { transform: scale(1.5); opacity: 0; } }
        
        body { 
            -webkit-user-select: none; 
            user-select: none; 
            background-color: #020617;
            overscroll-behavior-y: contain;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .status-glow-green { shadow: 0 0 15px #22c55e; }
        .status-glow-orange { shadow: 0 0 15px #f97316; }
        .status-glow-red { shadow: 0 0 15px #ef4444; }
    </style>
</head>
<body class="text-white font-sans p-4">

    <!-- Install Banner -->
    <div id="install-banner" class="hidden w-full max-w-md bg-orange-600 p-4 rounded-2xl mb-6 flex justify-between items-center shadow-2xl border border-orange-400">
        <div class="flex items-center gap-3">
            <span class="text-2xl">📲</span>
            <div class="text-[10px] font-bold uppercase tracking-tight">System-Installation bereit</div>
        </div>
        <button id="install-button" class="bg-white text-orange-600 px-4 py-2 rounded-xl font-black text-[10px] uppercase shadow-md">Installieren</button>
    </div>

    <header class="w-full max-w-md py-4 flex flex-col items-center">
        <h1 class="text-4xl font-black text-orange-500 tracking-tighter uppercase italic leading-none">Chuck Guard</h1>
        <span class="text-[10px] font-bold text-slate-500 uppercase tracking-[0.4em] mt-2 font-mono">Tactical AI Interface</span>
    </header>

    <main class="w-full max-w-md bg-slate-900/80 backdrop-blur-xl rounded-[3rem] p-8 shadow-2xl border border-white/10 flex flex-col gap-6 flex-1 overflow-hidden">
        
        <!-- Status Bar -->
        <div class="flex items-center justify-between border-b border-white/5 pb-4">
            <div class="flex items-center gap-3">
                <div id="status-dot" class="w-3 h-3 rounded-full bg-green-500 shadow-[0_0_10px_#22c55e]"></div>
                <span id="status-text" class="text-[10px] font-black uppercase text-slate-400 tracking-widest">Bereit</span>
            </div>
            <div class="text-[10px] font-mono text-slate-600 uppercase italic">BV9300_ULTIMATE</div>
        </div>

        <!-- Visual Core -->
        <div id="core-display" class="h-40 bg-black/50 rounded-[2rem] flex items-center justify-center relative border border-orange-500/20 overflow-hidden">
            <div id="idle-icon" class="text-orange-500/10 transition-opacity duration-500">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-32 h-32" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="0.5" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
                </svg>
            </div>
            
            <div id="active-ui" class="hidden flex flex-col items-center scale-110">
                <div class="relative">
                    <div class="absolute inset-0 bg-orange-600 rounded-full recording-ring"></div>
                    <div class="relative w-24 h-24 bg-orange-600 rounded-full flex items-center justify-center shadow-2xl">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" />
                        </svg>
                    </div>
                </div>
            </div>
        </div>

        <!-- Action Button -->
        <button id="action-btn" class="w-full bg-gradient-to-b from-orange-500 to-orange-700 text-white font-black py-8 rounded-[2rem] shadow-[0_10px_30px_-10px_rgba(234,88,12,0.5)] active:scale-[0.96] active:from-orange-600 transition-all border-b-4 border-orange-900 uppercase italic tracking-tighter text-xl">
            Abfangen
        </button>

        <!-- Result Console -->
        <div id="console-area" class="hidden flex flex-col gap-3">
            <div class="bg-black/40 rounded-2xl p-4 border border-white/5">
                <p id="live-transcript" class="text-xs text-slate-400 italic leading-relaxed">Warte auf Spracheingabe...</p>
            </div>
            
            <div id="verdict-card" class="bg-slate-800/50 rounded-2xl p-4 border border-white/10 flex items-center gap-4 transition-all duration-500">
                <div id="v-icon" class="text-3xl grayscale opacity-50">📡</div>
                <div>
                    <h3 id="v-title" class="font-black italic text-[11px] uppercase text-orange-500 tracking-wider">Scanning...</h3>
                    <p id="v-desc" class="text-[9px] text-slate-500 uppercase font-mono mt-0.5">Höre Umgebung ab</p>
                </div>
            </div>
        </div>

    </main>

    <script>
        // PWA & Service Worker
        let deferredPrompt;
        const installBanner = document.getElementById('install-banner');
        const installButton = document.getElementById('install-button');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBanner.classList.remove('hidden');
        });

        installButton.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') installBanner.classList.add('hidden');
                deferredPrompt = null;
            }
        });

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(() => {});
            });
        }

        // --- Core Logic ---
        const apiKey = ""; // Setze hier deinen Key ein
        const actionBtn = document.getElementById('action-btn');
        const activeUI = document.getElementById('active-ui');
        const idleIcon = document.getElementById('idle-icon');
        const consoleArea = document.getElementById('console-area');
        const liveTranscript = document.getElementById('live-transcript');
        const vCard = document.getElementById('verdict-card');
        const vTitle = document.getElementById('v-title');
        const vDesc = document.getElementById('v-desc');
        const vIcon = document.getElementById('v-icon');
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');

        let recognition;
        let isActive = false;

        function updateStatus(state, msg) {
            statusText.innerText = msg;
            statusDot.className = "w-3 h-3 rounded-full transition-all duration-300";
            if(state === 'idle') statusDot.classList.add('bg-green-500', 'shadow-[0_0_10px_#22c55e]');
            if(state === 'listen') statusDot.classList.add('bg-orange-500', 'animate-pulse', 'shadow-[0_0_10px_#f97316]');
            if(state === 'think') statusDot.classList.add('bg-blue-500', 'animate-spin', 'shadow-[0_0_10px_#3b82f6]');
            if(state === 'alert') statusDot.classList.add('bg-red-500', 'shadow-[0_0_10px_#ef4444]');
        }

        async function speak(text) {
            updateStatus('think', 'Chuck spricht');
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Chuck Norris sagt extrem autoritär: ${text}` }] }],
                        generationConfig: {
                            responseModalities: ["AUDIO"],
                            speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Puck" } } } 
                        }
                    })
                });
                const data = await res.json();
                const audioBase64 = data.candidates[0].content.parts[0].inlineData.data;
                const audio = new Audio("data:audio/wav;base64," + audioBase64);
                return new Promise(r => { 
                    audio.onended = () => { updateStatus('listen', 'Zuhören...'); r(); }; 
                    audio.play(); 
                });
            } catch (e) {
                const m = new SpeechSynthesisUtterance(text); m.lang = 'de-DE'; window.speechSynthesis.speak(m);
            }
        }

        async function analyze(text) {
            updateStatus('think', 'Analysiere...');
            const prompt = `Analysiere diesen Anruf als Chuck Norris. Kategorien: SCAM, BOT, OK. JSON: {"verdict": "...", "reason": "...", "comment": "..."}`;
            try {
                const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text }] }],
                        systemInstruction: { parts: [{ text: prompt }] },
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });
                const d = await r.json();
                return JSON.parse(d.candidates[0].content.parts[0].text);
            } catch (e) { return { verdict: 'UNKLAR', comment: 'Versuch es nochmal.' }; }
        }

        if ('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'de-DE';

            recognition.onresult = (e) => {
                let current = '';
                for (let i = e.resultIndex; i < e.results.length; ++i) {
                    current += e.results[i][0].transcript;
                }
                liveTranscript.innerText = `"${current}"`;
                
                if (current.length > 25 && !isActive) {
                    isActive = true;
                    analyze(current).then(res => {
                        vCard.className = "bg-red-900/40 rounded-2xl p-4 border-2 border-red-500 flex items-center gap-4 animate-pulse";
                        vTitle.innerText = res.verdict;
                        vDesc.innerText = res.comment;
                        vIcon.innerText = "💀";
                        vIcon.classList.remove('grayscale', 'opacity-50');
                        speak(res.comment);
                    });
                }
            };

            recognition.onend = () => { if(isActive) recognition.start(); };
        }

        actionBtn.addEventListener('click', async () => {
            isActive = false;
            consoleArea.classList.remove('hidden');
            idleIcon.classList.add('hidden');
            activeUI.classList.remove('hidden');
            
            vCard.className = "bg-slate-800/50 rounded-2xl p-4 border border-white/10 flex items-center gap-4";
            vTitle.innerText = "Scanning...";
            vDesc.innerText = "Höre Umgebung ab";
            vIcon.innerText = "📡";
            liveTranscript.innerText = "Zuhören...";

            await speak("Chuck Norris übernimmt jetzt. Sprich!");
            if(recognition) recognition.start();
            
            setTimeout(() => {
                activeUI.classList.add('hidden');
                idleIcon.classList.remove('hidden');
                if(recognition) recognition.stop();
                updateStatus('idle', 'Bereit');
            }, 40000);
        });
    </script>
</body>
</html>
