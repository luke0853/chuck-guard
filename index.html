        @keyframes ring { 0% { transform: scale(1); opacity: 0.8; } 100% { transform: scale(1.6); opacity: 0; } }
        body { background-color: #020617; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }

<body class="text-white flex flex-col items-center p-4 min-h-screen">

    <!-- Installations-Banner -->
    <div id="install-banner" class="hidden w-full max-w-md bg-orange-600 p-4 rounded-2xl mb-6 flex justify-between items-center shadow-2xl border border-orange-400">
        <div class="flex items-center gap-3">
            <span class="text-2xl">🛡️</span>
            <div class="flex flex-col">
                <span class="text-xs font-black uppercase">Chuck Guard installieren</span>
                <span class="text-[10px] opacity-80 uppercase">Homescreen-Icon mit Logo erhalten</span>
            </div>
        </div>
        <button id="install-btn" class="bg-black text-white px-4 py-2 rounded-xl font-black text-xs uppercase">Installieren</button>
    </div>

    <header class="w-full max-w-md py-8 flex justify-between items-start">
        <div class="flex flex-col">
            <h1 class="text-4xl font-black text-orange-600 tracking-tighter uppercase italic leading-none">Chuck Guard</h1>
            <span class="text-[9px] font-bold text-slate-500 uppercase tracking-[0.4em] mt-1 ml-1">Tactical Defense Mode</span>
        </div>
        <div class="flex items-center gap-2 bg-black/40 px-3 py-1.5 rounded-full border border-white/5">
            <div id="status-dot" class="w-2 h-2 rounded-full bg-green-500 shadow-[0_0_8px_#22c55e]"></div>
            <span id="status-text" class="text-[8px] font-black uppercase text-slate-300">Ready</span>
        </div>
    </header>

    <main class="w-full max-w-md glass-ui rounded-[2.5rem] p-6 flex flex-col gap-8 flex-1 shadow-2xl">
        <div class="h-48 bg-black/50 rounded-[2rem] flex items-center justify-center border border-white/5 relative">
            <div id="idle-icon" class="text-orange-500/10">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-32 h-32" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="0.3" d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" /></svg>
            </div>
            <div id="recording-ui" class="hidden">
                <div class="relative">
                    <div class="absolute inset-0 bg-orange-600 rounded-full recording-ring"></div>
                    <div class="relative w-24 h-24 bg-orange-600 rounded-full flex items-center justify-center shadow-2xl">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" /></svg>
                    </div>
                </div>
            </div>
        </div>

        <button id="start-btn" class="w-full bg-gradient-to-b from-orange-500 to-orange-700 text-white font-black py-6 rounded-2xl shadow-xl active:scale-95 transition-all uppercase italic text-xl border-b-4 border-orange-900">
            Abfangen starten
        </button>

        <div id="result-area" class="hidden flex flex-col gap-4">
            <div class="bg-black/60 rounded-2xl p-4 border border-white/5">
                <p id="transcript-text" class="text-xs text-slate-400 italic font-mono uppercase tracking-tighter">Initialisiere...</p>
            </div>
            <div id="verdict-box" class="bg-slate-800/40 rounded-2xl p-5 border border-white/10 flex items-center gap-4 transition-all duration-500">
                <div id="verdict-icon" class="text-3xl">🛡️</div>
                <div class="flex-1">
                    <h3 id="verdict-title" class="font-black italic text-xs uppercase text-orange-500 tracking-widest">Warte auf Scan</h3>
                    <p id="verdict-desc" class="text-[10px] text-slate-400 uppercase leading-tight mt-1">Höre Umgebung ab...</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        const startBtn = document.getElementById('start-btn');
        const recordingUI = document.getElementById('recording-ui');
        const idleIcon = document.getElementById('idle-icon');
        const resultArea = document.getElementById('result-area');
        const transcriptText = document.getElementById('transcript-text');
        const verdictBox = document.getElementById('verdict-box');
        const verdictTitle = document.getElementById('verdict-title');
        const verdictDesc = document.getElementById('verdict-desc');
        const verdictIcon = document.getElementById('verdict-icon');
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');
        const installBanner = document.getElementById('install-banner');
        const installBtn = document.getElementById('install-btn');

        let recognition;
        let isScreening = false;
        let deferredPrompt;

        // PWA Installation
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBanner.classList.remove('hidden');
        });

        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') installBanner.classList.add('hidden');
                deferredPrompt = null;
            }
        });

        // Lokale Stimme (Chuck Norris Style)
        function speak(text) {
            return new Promise(resolve => {
                window.speechSynthesis.cancel();
                const m = new SpeechSynthesisUtterance(text);
                const voices = window.speechSynthesis.getVoices();
                // Versuche eine deutsche männliche Stimme zu finden
                const male = voices.find(v => v.lang.startsWith('de') && /male|männlich|man/i.test(v.name)) || voices.find(v => v.lang.startsWith('de'));
                if (male) m.voice = male;
                m.lang = 'de-DE';
                m.pitch = 0.4; // Tief
                m.rate = 0.8; // Langsam
                m.onend = resolve;
                window.speechSynthesis.speak(m);
            });
        }

        // Keywords für Offline-Analyse
        function analyze(text) {
            const t = text.toLowerCase();
            const scams = ["gewinn", "abo", "polizei", "geld", "vertrag", "enkel", "kredit", "werbung"];
            const bots = ["paket", "dhl", "bote", "lieferung", "amazon", "tür", "post", "hermes"];

            if (scams.some(w => t.includes(w))) 
                return { v: 'SCAM', t: 'BEDROHUNG', i: '💀', c: 'Scam erkannt. Chuck Norris legt jetzt für dich auf.', cls: 'bg-red-900/40 border-red-500 shadow-[0_0_15px_rgba(239,68,68,0.3)]' };
            if (bots.some(w => t.includes(w))) 
                return { v: 'BOTE', t: 'PAKETBOTE', i: '📦', c: 'Paketbote identifiziert. Du kannst das Gespräch annehmen.', cls: 'bg-blue-900/40 border-blue-500 shadow-[0_0_15px_rgba(59,130,246,0.3)]' };
            return null;
        }

        // Spracherkennung initialisieren
        if ('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'de-DE';
            
            recognition.onresult = (e) => {
                let trans = '';
                for (let i = e.resultIndex; i < e.results.length; ++i) {
                    if (e.results[i].isFinal) trans += e.results[i][0].transcript;
                }
                if (trans.trim() && isScreening) {
                    transcriptText.innerText = `RECOGNIZED: "${trans.trim()}"`;
                    const res = analyze(trans);
                    if (res) processVerdict(res);
                }
            };

            recognition.onerror = () => resetUI();
        }

        async function processVerdict(res) {
            isScreening = false;
            recognition.stop();
            
            verdictTitle.innerText = res.t;
            verdictIcon.innerText = res.i;
            verdictDesc.innerText = res.c;
            verdictBox.className = `rounded-2xl p-5 border flex items-center gap-4 transition-all duration-500 ${res.cls}`;
            
            statusDot.className = "w-2 h-2 rounded-full bg-blue-500 animate-pulse";
            statusText.innerText = "CHUCK SPRICHT";
            
            await speak(res.c);
            resetUI();
        }

        function resetUI() {
            isScreening = false;
            startBtn.disabled = false;
            startBtn.innerText = "Anruf Abfangen";
            idleIcon.classList.remove('hidden');
            recordingUI.classList.add('hidden');
            statusDot.className = "w-2 h-2 rounded-full bg-green-500 shadow-[0_0_8px_#22c55e]";
            statusText.innerText = "Ready";
        }

        startBtn.addEventListener('click', async () => {
            if (isScreening) return;
            isScreening = true;
            
            resultArea.classList.remove('hidden');
            startBtn.disabled = true;
            startBtn.innerText = "SCAN LÄUFT";
            idleIcon.classList.add('hidden');
            recordingUI.classList.remove('hidden');
            
            statusText.innerText = "CHUCK SPRICHT";
            await speak("Hier ist Chuck Norris. Erkläre dein Anliegen sofort, oder ich beende diese Verbindung.");
            
            statusText.innerText = "ZUHÖREN...";
            if (recognition) {
                try { recognition.start(); } catch(e) {}
            }
            
            // Auto-Stop nach 25 Sek
            setTimeout(() => { if(isScreening) resetUI(); }, 25000);
        });

        // Stimmen laden für Android/Chrome
        window.speechSynthesis.getVoices();
    </script>
</body>
</html>
